spring:
  application:
    name: domain-data-business-intelligence
    version: 1.0.0
    description: Core Data Business Intelligence Service
    team:
      name: Firefly Software Foundation
      email: dev@getfirefly.io

firefly:
  service-client:
    enabled: true
    rest:
      max-connections: 200
      response-timeout: 30s
      connect-timeout: 10s
      read-timeout: 30s
      compression-enabled: true
      follow-redirects: true
      max-in-memory-size: 2097152 # 2MB
      default-content-type: application/json
      default-accept-type: application/json
  data:
    enrichment:
      enabled: true
      # SmartEnrichmentController in fireflyframework-starter-data takes
      # EnrichmentCacheService as a required constructor dep, so the cache
      # bean must be created or the context fails to start.
      cache-enabled: true
      discovery:
        enabled: true

orbis:
  # Pointed at the local Python mock ORBIS server (mock-orbis-server/mock_orbis_server.py).
  # Override with ORBIS_BASE_URL to target the real service.
  base-url: ${ORBIS_BASE_URL:http://127.0.0.1:55335}
  api-token: ${ORBIS_API_TOKEN:mock-orbis-token}

server:
  port: 8085
